site_name: CLM-FATES on Hydra Tutorial

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Installation: installation.md
  - Default Global Run: default-global-run.md
  - Site-Level Simulations: site-level-runs.md
  - Inventory Initialization: inventory-init.md
  - Regional Simulations: regional-runs.md
  - Visualisation: visualisation.md
  - Further Resources: further-resources.md